{{ define "main" }}
  <header class="page-header">
    <div class="page-header-inner">
      <h2>{{ .Title }}</h2>
      {{ with .Description }}<p class="page-header-lede">{{ . }}</p>{{ end }}
      {{ with .Params.dateLabel }}<p class="eyebrow eyebrow-light">{{ . }}</p>{{ end }}
    </div>
  </header>
  <section class="section">
    <div class="section-inner narrow">
      <div class="stack prose">
        {{ .Content }}
      </div>
    </div>
  </section>
{{ end }}
