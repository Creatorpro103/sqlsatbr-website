{{ define "main" }}
  <header class="page-header">
    <div class="page-header-inner">
      <h2>{{ .Title }}</h2>
      {{ with .Description }}<p class="page-header-lede">{{ . }}</p>{{ end }}
    </div>
  </header>
  <section class="section">
    <div class="section-inner narrow stack">
      {{ if .Content }}<div class="prose">{{ .Content }}</div>{{ end }}
      <ul class="list-reset">
        {{ range .Pages }}
          <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
        {{ end }}
      </ul>
    </div>
  </section>
{{ end }}
